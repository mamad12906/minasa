<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<title>minasa — تحليلات المتاجر</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Rubik:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; background:#0B0F0E; font-family: 'IBM Plex Sans Arabic', 'Rubik', system-ui, sans-serif; }
  * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  ::-webkit-scrollbar { display: none; }
  /* hide scrollbars on horizontal scrollers */
  .design-canvas * { scrollbar-width: none; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components/tokens.jsx"></script>
<script type="text/babel" src="components/icons.jsx"></script>
<script type="text/babel" src="components/charts.jsx"></script>
<script type="text/babel" src="components/ui.jsx"></script>
<script type="text/babel" src="components/ios-frame.jsx"></script>
<script type="text/babel" src="components/design-canvas.jsx"></script>
<script type="text/babel" src="components/screens-a.jsx"></script>
<script type="text/babel" src="components/screens-b.jsx"></script>
<script type="text/babel" src="components/screen-zabaen.jsx"></script>

<script type="text/babel" data-presets="react">
const TWEAKS = /*EDITMODE-BEGIN*/{
  "accent": "mint",
  "density": "medium",
  "showGuides": false
}/*EDITMODE-END*/;

// accent presets (swaps MINASA.mint at runtime)
const ACCENTS = {
  mint:   { mint: '#A8F0C6', mintDeep: '#5EE2A0', mintInk: '#0B2018', up: '#5EE2A0' },
  violet: { mint: '#C7A7FF', mintDeep: '#9B7BFF', mintInk: '#1C0F2C', up: '#C7A7FF' },
  coral:  { mint: '#FFB098', mintDeep: '#FF8C6B', mintInk: '#2C120A', up: '#FFB098' },
  sky:    { mint: '#7FB8FF', mintDeep: '#4C8FE3', mintInk: '#0A1A2C', up: '#7FB8FF' },
};

function applyAccent(name) {
  const a = ACCENTS[name] || ACCENTS.mint;
  Object.assign(window.MINASA, a);
  Object.assign(window.MINASA, { c1: a.mint });
}

function Phone({ label, children }) {
  return (
    <DCArtboard label={label} style={{ borderRadius: 48, background: '#0B0F0E', width: 402, height: 874 }}>
      <IOSDevice dark={true} width={402} height={874}>
        {children}
      </IOSDevice>
    </DCArtboard>
  );
}

function App() {
  const [accent, setAccent] = React.useState(TWEAKS.accent);
  const [, force] = React.useReducer(x => x + 1, 0);

  React.useEffect(() => {
    applyAccent(accent);
    force();
  }, [accent]);

  // tweaks protocol
  const [tweaksOpen, setTweaksOpen] = React.useState(false);
  React.useEffect(() => {
    const onMsg = (e) => {
      if (!e.data) return;
      if (e.data.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const updateAccent = (a) => {
    setAccent(a);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { accent: a } }, '*');
  };

  return (
    <>
      <DesignCanvas>
        {/* header banner */}
        <div style={{ padding: '0 60px 40px', maxWidth: 1400 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
            <div style={{ width: 52, height: 52, borderRadius: 14, background: '#0B0F0E', display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: '0 2px 12px rgba(0,0,0,0.15)' }}>
              <div style={{ width: 26, height: 26, borderRadius: 7, background: window.MINASA.mint }}/>
            </div>
            <div>
              <div style={{ fontSize: 32, fontWeight: 700, color: '#1a1612', letterSpacing: -0.5, fontFamily: 'IBM Plex Sans Arabic' }}>
                مِناصة <span style={{ color: '#8a7a6a', fontWeight: 500 }}>/ minasa</span>
              </div>
              <div style={{ fontSize: 14, color: '#6a5a4a', marginTop: 2, fontFamily: 'IBM Plex Sans Arabic' }}>
                تطبيق تحليلات وإدارة علاقات العملاء للتجارة الإلكترونية · عربي RTL · ١٠ شاشات
              </div>
            </div>
          </div>
        </div>

        <DCSection title="التأسيس والرئيسية" subtitle="الانطباع الأول وقلب التطبيق — نظرة شاملة على أداء اليوم">
          <Phone label="01 · الترحيب والتسجيل"><OnboardingScreen/></Phone>
          <Phone label="02 · الرئيسية (Dashboard)"><HomeScreen/></Phone>
        </DCSection>

        <DCSection title="التحليلات والأداء" subtitle="رؤية عميقة على المبيعات، المنتجات، والطلبات">
          <Phone label="03 · المبيعات والإيرادات"><AnalyticsScreen/></Phone>
          <Phone label="04 · أداء المنتجات"><ProductsScreen/></Phone>
          <Phone label="05 · الطلبات"><OrdersScreen/></Phone>
        </DCSection>

        <DCSection title="الزبائن وعلاقاتهم (CRM)" subtitle="قاعدة الزبائن، الشرائح، دليل الزبائن، والملف الشخصي">
          <Phone label="06 · نظرة عامة والشرائح"><CustomersListScreen/></Phone>
          <Phone label="07 · دليل الزبائن (الكامل)"><ZabaenDirectoryScreen/></Phone>
          <Phone label="08 · ملف الزبونة (VIP)"><CustomerDetailScreen/></Phone>
        </DCSection>

        <DCSection title="الذكاء والإعدادات" subtitle="استبصارات مُولّدة، تقارير محفوظة، وإعدادات المتجر">
          <Phone label="09 · التنبيهات"><NotificationsScreen/></Phone>
          <Phone label="10 · التقارير والاستبصارات"><ReportsScreen/></Phone>
          <Phone label="11 · الإعدادات"><SettingsScreen/></Phone>
        </DCSection>

        {/* design notes — post-its */}
        <div style={{ padding: '0 60px 100px', maxWidth: 1400 }}>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 24, marginTop: 20 }}>
            <div style={{ background: '#fef4a8', padding: 18, borderRadius: 2, transform: 'rotate(-1deg)', boxShadow: '0 4px 12px rgba(0,0,0,0.08)', fontFamily: 'IBM Plex Sans Arabic', fontSize: 13, lineHeight: 1.7, color: '#5a4a2a' }}>
              <b>النظام البصري</b><br/>
              خلفية داكنة #0B0F0E · أخضر نعناعي كلون تمييزي (#A8F0C6) · خط IBM Plex Arabic للعربية + Rubik للأرقام (tabular). الأرقام دائمًا LTR لتحافظ على التنسيق.
            </div>
            <div style={{ background: '#c6e8ff', padding: 18, borderRadius: 2, transform: 'rotate(1deg)', boxShadow: '0 4px 12px rgba(0,0,0,0.08)', fontFamily: 'IBM Plex Sans Arabic', fontSize: 13, lineHeight: 1.7, color: '#1a3a5a' }}>
              <b>الكثافة والإيقاع</b><br/>
              الرئيسية بطاقة هيرو بأخضر كامل تثبّت الهوية · بقية الشاشات سطوح داكنة بحدود ناعمة · مسافات ١٠–١٨بكسل لتنفّس المحتوى دون إهدار.
            </div>
            <div style={{ background: '#ffd4e1', padding: 18, borderRadius: 2, transform: 'rotate(-0.5deg)', boxShadow: '0 4px 12px rgba(0,0,0,0.08)', fontFamily: 'IBM Plex Sans Arabic', fontSize: 13, lineHeight: 1.7, color: '#5a1a2a' }}>
              <b>الاستبصارات الذكية</b><br/>
              عنصر متكرر بأيقونة ✦ — يحوّل البيانات من أرقام إلى قرارات. يظهر في الرئيسية، العملاء، والتقارير. لهجة مباشرة وودودة.
            </div>
          </div>
        </div>
      </DesignCanvas>

      {/* Tweaks panel */}
      {tweaksOpen && (
        <div style={{
          position: 'fixed', bottom: 20, right: 20, zIndex: 100,
          background: '#141918', borderRadius: 18, padding: 18,
          border: '1px solid rgba(255,255,255,0.1)',
          boxShadow: '0 20px 60px rgba(0,0,0,0.4)',
          width: 260, color: '#F2F5F3',
          fontFamily: 'IBM Plex Sans Arabic',
        }}>
          <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 12 }}>Tweaks</div>
          <div style={{ fontSize: 11, color: 'rgba(242,245,243,0.6)', marginBottom: 8 }}>اللون التمييزي</div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: 8 }}>
            {Object.entries(ACCENTS).map(([k, v]) => (
              <div key={k} onClick={() => updateAccent(k)} style={{
                aspectRatio: '1', borderRadius: 10, background: v.mint, cursor: 'pointer',
                border: accent === k ? '2px solid #fff' : '2px solid transparent',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                color: v.mintInk, fontSize: 10, fontWeight: 700,
              }}>{k}</div>
            ))}
          </div>
          <div style={{ fontSize: 11, color: 'rgba(242,245,243,0.4)', marginTop: 14, lineHeight: 1.5 }}>
            اختر لونًا — سيُطبّق على جميع الشاشات فورًا.
          </div>
        </div>
      )}
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
