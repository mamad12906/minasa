<meta charset="utf-8"/>

<link rel="stylesheet" href="design-system.css"/>
<style>
  body { overflow-x: hidden; }
  .app-main {
    margin-right: 244px;
    transition: margin-right 0.2s ease;
    min-height: 100vh;
    min-width: 0;
  }
  .app-main.collapsed { margin-right: 68px; }
  @media (max-width: 960px) {
    .hide-tight { display: none !important; }
  }

  /* variation switcher */
  .var-switcher {
    display: inline-flex;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 3px;
    gap: 2px;
  }
  .var-switcher button {
    padding: 5px 12px;
    border-radius: 7px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.12s;
  }
  .var-switcher button.active {
    background: var(--brand-tint);
    color: var(--brand);
  }

  .card-hover { transition: transform 0.12s, border-color 0.12s; }
  .card-hover:hover { border-color: var(--border-strong); }

  /* Login full takeover */
  body.login-mode .app-main { margin-right: 0 !important; }

  /* Tweaks panel */
  .tweaks-panel {
    position: fixed;
    bottom: 20px;
    inset-inline-start: 20px;
    z-index: 200;
    width: 280px;
    background: var(--bg-card);
    border: 1px solid var(--border-strong);
    border-radius: 14px;
    padding: 16px;
    box-shadow: var(--shadow-lg);
    color: var(--text-primary);
    font-family: 'IBM Plex Sans Arabic', system-ui, sans-serif;
  }
  .tweaks-panel h4 { margin-bottom: 4px; }
  .tweaks-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border-subtle); }
  .tweaks-row:last-child { border-bottom: none; }
  .tweaks-swatch {
    width: 28px; height: 28px; border-radius: 8px;
    cursor: pointer; border: 2px solid transparent;
  }
  .tweaks-swatch.active { border-color: var(--text-primary); }

  .toggle {
    width: 36px; height: 20px; border-radius: 12px; background: var(--border-strong);
    position: relative; cursor: pointer; transition: background 0.15s;
  }
  .toggle.on { background: var(--brand); }
  .toggle::after {
    content: '';
    position: absolute; top: 2px; inset-inline-start: 2px;
    width: 16px; height: 16px; border-radius: 50%; background: #fff;
    transition: inset-inline-start 0.15s;
  }
  .toggle.on::after { inset-inline-start: 18px; }
</style>
</head>

const BRAND_HUES = {
  olive:    { brand: '#2D6B55', hover: '#3A8069', strong: '#1A4A38', deep: '#0F4C3A', tint: 'rgba(45, 107, 85, 0.14)', tintHi: 'rgba(45, 107, 85, 0.28)' },

};

function applyBrand(hue) {
  const h = BRAND_HUES[hue] || BRAND_HUES.olive;
  const r = document.documentElement;
  r.style.setProperty('--brand', h.brand);
  r.style.setProperty('--brand-hover', h.hover);
  r.style.setProperty('--brand-strong', h.strong);
  r.style.setProperty('--brand-deep', h.deep);
  r.style.setProperty('--brand-tint', h.tint);
  r.style.setProperty('--brand-tint-hi', h.tintHi);
  r.style.setProperty('--c1', h.brand);
}

        ))}
      </div>

      <div className="card" style={{ background: 'linear-gradient(140deg, var(--danger-bg), transparent)', borderColor: 'var(--danger-border)' }}>
        <div style={{ display: 'flex', alignItems: 'flex-start', gap: 12 }}>
          <div style={{ width: 32, height: 32, borderRadius: 8, background: 'var(--danger-bg)', color: 'var(--danger)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}><Icon name="shield" size={15}/></div>
          <div>
            <h4 style={{ color: 'var(--danger)', marginBottom: 4 }}>منطقة خطر</h4>
            <p style={{ fontSize: 12, marginBottom: 12 }}>هذه العمليات غير قابلة للتراجع. خذ نسخة احتياطية قبل التنفيذ.</p>
            <div style={{ display: 'flex', gap: 8 }}>
              <button className="btn btn--danger btn--sm">إعادة تعيين القاعدة</button>
              <button className="btn btn--danger btn--sm">حذف السجلات القديمة</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
);

// ---- Topbar titles ----
const TITLES = {
  dashboard:  { title: 'لوحة التحكم',  subtitle: 'نظرة عامة على أداء النظام اليوم',        breadcrumb: ['الرئيسية', 'لوحة التحكم'] },
  customers:  { title: 'الزبائن',         subtitle: '٥٬١٨٢ زبون — قاعدة البيانات الكاملة',  breadcrumb: ['الرئيسية', 'الزبائن'] },
  invoices:   { title: 'الفواتير',        subtitle: '٨٬٩٣٤ فاتورة — كل الحالات',              breadcrumb: ['الرئيسية', 'الفواتير'] },
  reports:    { title: 'التقارير',        subtitle: 'تقارير دورية وتحليلات متقدّمة',        breadcrumb: ['الرئيسية', 'التقارير'] },
  whatsapp:   { title: 'واتساب أعمال', subtitle: '٥ محادثات نشطة · متصل',                    breadcrumb: ['الرئيسية', 'واتساب'] },
  reminders:  { title: 'التذكيرات',     subtitle: '٢٤ تذكيرًا نشطًا · ٧ متأخرة',            breadcrumb: ['الرئيسية', 'التذكيرات'] },
  import:     { title: 'استيراد Excel',  subtitle: 'إضافة زبائن دفعةً واحدة',                breadcrumb: ['الرئيسية', 'استيراد'] },
  backup:     { title: 'النسخ الاحتياطي', subtitle: 'حماية وحفظ البيانات',                    breadcrumb: ['الرئيسية', 'النسخ الاحتياطي'] },
  admin:      { title: 'لوحة الأدمن',    subtitle: '٦ مستخدمين · ٢ أدمن',                    breadcrumb: ['الرئيسية', 'الإدارة', 'الأدمن'] },
  audit:      { title: 'سجل التغييرات', subtitle: 'تتبّع كل العمليات الحسّاسة',            breadcrumb: ['الرئيسية', 'الإدارة', 'السجل'] },
  database:   { title: 'قاعدة البيانات', subtitle: 'SQLite · صحيحة · ٢٫٤ ج.ب',              breadcrumb: ['الرئيسية', 'الإدارة', 'القاعدة'] },
  settings:   { title: 'الإعدادات',       subtitle: 'تخصيص النظام والتفضيلات',              breadcrumb: ['الرئيسية', 'الإعدادات'] },
};

function App() {
  const [active, setActive] = React.useState(() => localStorage.getItem('minasa-active') || 'dashboard');
  const [collapsed, setCollapsed] = React.useState(() => window.innerWidth <= 1200);
  const [selectedCustomer, setSelectedCustomer] = React.useState(null);
  const [detailVariant, setDetailVariant] = React.useState('A');
  const [modal, setModal] = React.useState(null); // null | {mode:'add'} | {mode:'edit', customer}

  React.useEffect(() => {
    const mq = window.matchMedia('(max-width: 1200px)');
    const handler = (e) => setCollapsed(e.matches);
    mq.addEventListener('change', handler);
    return () => mq.removeEventListener('change', handler);
  }, []);
  const [theme, setTheme] = React.useState(TWEAKS.theme);
  const [brandHue, setBrandHue] = React.useState(TWEAKS.brandHue);
  const [dashVar, setDashVar] = React.useState('A');
  const [custVar, setCustVar] = React.useState('A');
  const [showLogin, setShowLogin] = React.useState(TWEAKS.showLogin);
  const [tweaksOpen, setTweaksOpen] = React.useState(false);

  React.useEffect(() => { localStorage.setItem('minasa-active', active); }, [active]);
  React.useEffect(() => { document.documentElement.setAttribute('data-theme', theme); }, [theme]);
  React.useEffect(() => { applyBrand(brandHue); }, [brandHue]);
  React.useEffect(() => {
    document.body.classList.toggle('login-mode', showLogin);
  }, [showLogin]);

  // Tweaks protocol
  React.useEffect(() => {
    const onMsg = (e) => {
      if (!e.data) return;
      if (e.data.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const persist = (edits) => window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');

  // Render
  if (showLogin) {
    return (
      <>
        <LoginScreen/>
        <button onClick={() => { setShowLogin(false); persist({ showLogin: false }); }}
          className="btn btn--primary btn--sm"
          style={{ position: 'fixed', bottom: 20, insetInlineEnd: 20, zIndex: 100 }}>
          دخول تجريبي ← اللوحة
        </button>
        {tweaksOpen && <TweaksPanel {...{ theme, setTheme, brandHue, setBrandHue, showLogin, setShowLogin, persist }}/>}
      </>
    );
  }

  const dashMap = { A: <DashboardA/>, B: <DashboardB/>, C: <DashboardC/> };

  // Click interceptor for customer rows/cards — attaches to document, picks up
  // data-customer-name or uses event delegation on the customers screen
  const customersWithHandlers = React.useMemo(() => {
    const onRowClick = (customer) => setSelectedCustomer(customer);
    const onAdd = () => setModal({ mode: 'add' });
    const custMap = {
      A: <CustomersA onRowClick={onRowClick} onAdd={onAdd}/>,
      B: <CustomersB onRowClick={onRowClick} onAdd={onAdd}/>,
      C: <CustomersC onRowClick={onRowClick} onAdd={onAdd}/>,
    };
    return custMap;
  }, [custVar]);

  const current = TITLES[active] || TITLES.dashboard;

  const screenActions = () => {
    if (active === 'dashboard') return (
      <div className="var-switcher" title="بدّل بين أنماط لوحة التحكم الثلاثة">
        {['A','B','C'].map(k => (
          <button key={k} className={dashVar === k ? 'active' : ''} onClick={() => setDashVar(k)}>نمط {k}</button>
        ))}
      </div>
    );
    if (active === 'customers') return (
      <div className="var-switcher" title="بدّل بين أنماط عرض الزبائن">
        {[['A','جدول'],['B','بطاقات'],['C','مقسّم']].map(([k,l]) => (
          <button key={k} className={custVar === k ? 'active' : ''} onClick={() => setCustVar(k)}>{l}</button>
        ))}
      </div>
    );
    return null;
  };

  return (
    <>
      <Sidebar active={active} onNavigate={setActive} collapsed={collapsed} onToggle={() => setCollapsed(v => !v)}/>
      <main className={`app-main ${collapsed ? 'collapsed' : ''}`}>
        <Topbar
          title={current.title}
          subtitle={current.subtitle}
          breadcrumb={current.breadcrumb}
          isDark={theme === 'dark'}
          onToggleTheme={() => { const t = theme === 'dark' ? 'light' : 'dark'; setTheme(t); persist({ theme: t }); }}
          onShowNotif={() => setActive('reminders')}
          actions={screenActions()}
        />
        {active === 'dashboard' && dashMap[dashVar]}
        {active === 'customers' && !selectedCustomer && customersWithHandlers[custVar]}
        {active === 'customers' && selectedCustomer && (
          <CustomerDetailPage
            customer={selectedCustomer}
            variant={detailVariant}
            onVariant={setDetailVariant}
            onBack={() => setSelectedCustomer(null)}
            onEdit={() => setModal({ mode: 'edit', customer: selectedCustomer })}
          />
        )}
        {active === 'invoices'  && <InvoicesScreen/>}
        {active === 'reports'   && <ReportsDeskScreen/>}
        {active === 'whatsapp'  && <WhatsAppScreen/>}
        {active === 'reminders' && <RemindersScreen/>}
        {active === 'import'    && <ImportScreen/>}
        {active === 'backup'    && <SettingsDeskScreen/>}
        {active === 'admin'     && <AdminScreen/>}
        {active === 'audit'     && <AuditScreen/>}
        {active === 'database'  && <DatabaseScreen/>}
        {active === 'settings'  && <SettingsDeskScreen/>}
      </main>
      {modal && (
        <CustomerFormModal
          mode={modal.mode}
          initial={modal.customer}
          onClose={() => setModal(null)}
          onSave={() => setModal(null)}
        />
      )}
      {tweaksOpen && <TweaksPanel {...{ theme, setTheme, brandHue, setBrandHue, showLogin, setShowLogin, persist }}/>}
    </>
  );
}

function TweaksPanel({ theme, setTheme, brandHue, setBrandHue, showLogin, setShowLogin, persist }) {
  return (
    <div className="tweaks-panel">
      <h4 style={{ marginBottom: 2 }}>Tweaks</h4>
      <p style={{ fontSize: 11.5, color: 'var(--text-muted)', marginBottom: 10 }}>تخصيصات سريعة للعرض</p>

      <div className="tweaks-row">
        <span style={{ fontSize: 13 }}>الوضع الداكن</span>
        <div className={`toggle ${theme === 'dark' ? 'on' : ''}`}
          onClick={() => { const t = theme === 'dark' ? 'light' : 'dark'; setTheme(t); persist({ theme: t }); }}/>
      </div>

      <div style={{ padding: '10px 0', borderBottom: '1px solid var(--border-subtle)' }}>
        <div style={{ fontSize: 13, marginBottom: 8 }}>اللون الرئيسي</div>
        <div style={{ display: 'flex', gap: 8 }}>
          {Object.entries(BRAND_HUES).map(([k, v]) => (
            <div key={k} className={`tweaks-swatch ${brandHue === k ? 'active' : ''}`}
              style={{ background: v.brand }}
              onClick={() => { setBrandHue(k); persist({ brandHue: k }); }}
              title={k}/>
          ))}
        </div>
      </div>

      <div className="tweaks-row">
        <span style={{ fontSize: 13 }}>عرض شاشة الدخول</span>
        <div className={`toggle ${showLogin ? 'on' : ''}`}
          onClick={() => { const v = !showLogin; setShowLogin(v); persist({ showLogin: v }); }}/>
      </div>

      <div style={{ fontSize: 10.5, color: 'var(--text-faint)', marginTop: 8 }}>
        ⌘K بحث · تنقّل من الشريط الجانبي · A/B/C تبديل الأنماط
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
