<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="api-key" content="__API_KEY__">
<title>تسجيل الدخول · مِنَصّة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Arabic:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --brand-500: #1d4ed8;
    --brand-700: #1e3a8a;
    --bg: #f4f6fb;
    --surface: #ffffff;
    --border: #dde3ee;
    --border-2: #c8d1e0;
    --ink: #0f172a;
    --ink-2: #475569;
    --muted: #94a3b8;
    --danger: #dc2626;
    --danger-soft: #fef2f2;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; font-family: 'IBM Plex Arabic', system-ui, sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; -webkit-font-smoothing: antialiased; }
  .wrap { max-width: 420px; margin: 0 auto; padding: 64px 24px 40px; }
  .brand { display: flex; flex-direction: column; align-items: center; margin-bottom: 28px; }
  .mark { width: 68px; height: 68px; border-radius: 18px; background: linear-gradient(135deg, var(--brand-500), var(--brand-700)); display: flex; align-items: center; justify-content: center; box-shadow: 0 12px 32px rgba(29,78,216,0.30); margin-bottom: 14px; }
  .mark::before { content: ''; width: 22px; height: 22px; background: #fff; border-radius: 50%; box-shadow: 0 -18px 0 -7px rgba(255,255,255,0.95), 14px 11px 0 -7px rgba(255,255,255,0.75), -14px 11px 0 -7px rgba(255,255,255,0.55); }
  .brand h1 { font-size: 24px; font-weight: 800; letter-spacing: -0.6px; margin: 0 0 4px; }
  .brand p { font-size: 13px; color: var(--ink-2); margin: 0; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; box-shadow: 0 8px 24px rgba(10,23,51,0.04); }
  .card h2 { font-size: 17px; font-weight: 700; margin: 0 0 4px; }
  .card .sub { font-size: 13px; color: var(--ink-2); margin: 0 0 18px; }
  .field { margin-bottom: 14px; }
  .label { display: flex; align-items: center; font-size: 12.5px; font-weight: 600; color: var(--ink); margin-bottom: 6px; }
  .label .req { color: var(--danger); margin-right: 3px; }
  .label .hint { margin-right: auto; font-size: 11px; font-weight: 400; color: var(--muted); }
  .input { width: 100%; height: 46px; border: 1px solid var(--border-2); border-radius: 12px; padding: 0 14px; font: inherit; font-size: 14px; color: var(--ink); background: var(--surface); transition: border-color .15s, box-shadow .15s; direction: rtl; }
  .input:focus { outline: none; border-color: var(--brand-500); box-shadow: 0 0 0 3px rgba(29,78,216,0.12); }
  .input.ltr { direction: ltr; text-align: left; font-family: 'IBM Plex Mono', ui-monospace, monospace; }
  .btn { width: 100%; height: 48px; border: none; border-radius: 12px; background: var(--brand-500); color: #fff; font: inherit; font-size: 15px; font-weight: 700; cursor: pointer; transition: background .15s, transform .05s; }
  .btn:hover:not(:disabled) { background: var(--brand-700); }
  .btn:active:not(:disabled) { transform: scale(0.99); }
  .btn:disabled { opacity: .55; cursor: not-allowed; }
  .alert { border-radius: 10px; padding: 10px 12px; font-size: 13px; font-weight: 500; margin-bottom: 14px; border: 1px solid; }
  .alert.error { background: var(--danger-soft); border-color: rgba(220,38,38,0.25); color: var(--danger); }
  .toggle-advanced { display: flex; align-items: center; cursor: pointer; padding: 4px 0; margin: 6px 0; font-size: 12px; color: var(--muted); user-select: none; }
  .toggle-advanced .arrow { display: inline-block; transition: transform .15s; margin-left: 4px; font-size: 14px; }
  .toggle-advanced.open .arrow { transform: rotate(180deg); }
  .footer { text-align: center; margin-top: 24px; font-size: 11.5px; color: var(--muted); font-family: 'IBM Plex Mono', ui-monospace, monospace; }
  .footer a { color: var(--brand-500); text-decoration: none; }
  .footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <div class="mark"></div>
      <h1>مِنَصّة</h1>
      <p>تسجيل الدخول</p>
    </div>

    <div class="card">
      <h2>مرحباً بعودتك</h2>
      <p class="sub">سجّل الدخول للمتابعة إلى لوحة التحكم.</p>

      <div id="alert" class="alert error" style="display:none"></div>

      <form id="loginForm" novalidate>
        <div class="field">
          <div class="label">اسم المستخدم <span class="req">*</span></div>
          <input class="input ltr" name="username" autocomplete="username" placeholder="admin" required>
        </div>

        <div class="field">
          <div class="label">كلمة المرور <span class="req">*</span></div>
          <input class="input ltr" type="password" name="password" autocomplete="current-password" required>
        </div>

        <div class="toggle-advanced" id="toggleAdv">
          <span class="arrow">▾</span>
          <span>رمز الحساب (متقدم)</span>
        </div>
        <div class="field" id="slugField" style="display:none">
          <input class="input ltr" name="tenant_slug" placeholder="default" autocomplete="off">
        </div>

        <button class="btn" type="submit" id="submitBtn">دخول</button>
      </form>
    </div>

    <div class="footer">
      ليس لديك حساب؟ <a href="/signup">أنشئ حساباً جديداً</a>
    </div>
  </div>

<script>
(function() {
  const apiKey = document.querySelector('meta[name="api-key"]').content;
  const form = document.getElementById('loginForm');
  const btn = document.getElementById('submitBtn');
  const alertBox = document.getElementById('alert');
  const toggle = document.getElementById('toggleAdv');
  const slugField = document.getElementById('slugField');

  // Pre-fill the slug from a previous successful login on this device,
  // mirroring the mobile app behaviour. Default tenant has no slug stored.
  try {
    const saved = localStorage.getItem('tenant_slug');
    if (saved && saved !== 'default') {
      slugField.style.display = '';
      toggle.classList.add('open');
      slugField.querySelector('input').value = saved;
    }
  } catch {}

  toggle.addEventListener('click', () => {
    const open = slugField.style.display !== 'none';
    slugField.style.display = open ? 'none' : '';
    toggle.classList.toggle('open', !open);
  });

  function showError(msg) {
    alertBox.textContent = msg;
    alertBox.style.display = '';
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    alertBox.style.display = 'none';
    const data = Object.fromEntries(new FormData(form).entries());
    if (!data.username || !data.password) {
      return showError('أدخل اسم المستخدم وكلمة المرور');
    }
    const slug = (data.tenant_slug || '').trim().toLowerCase();

    btn.disabled = true;
    btn.textContent = 'جاري الدخول...';
    try {
      const body = { username: data.username.trim(), password: data.password };
      if (slug) body.tenant_slug = slug;
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-API-Key': apiKey },
        body: JSON.stringify(body),
      });
      const j = await res.json().catch(() => ({}));
      if (!res.ok || !j.token) {
        return showError(j.error || 'اسم المستخدم أو كلمة المرور غير صحيحة');
      }
      // Persist for subsequent dashboard requests + remember slug for next time.
      try {
        localStorage.setItem('token', j.token);
        localStorage.setItem('user', JSON.stringify(j.user || {}));
        if (slug && slug !== 'default') localStorage.setItem('tenant_slug', slug);
        else localStorage.removeItem('tenant_slug');
      } catch {}
      location.href = '/dashboard';
    } catch (err) {
      showError('تعذّر الاتصال بالسيرفر');
    } finally {
      btn.disabled = false;
      btn.textContent = 'دخول';
    }
  });
})();
</script>
</body>
</html>
