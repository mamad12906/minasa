<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="api-key" content="__API_KEY__">
<title>لوحة التحكم · مِنَصّة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Arabic:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --brand-500: #1d4ed8;
    --brand-700: #1e3a8a;
    --bg: #f4f6fb;
    --surface: #ffffff;
    --border: #dde3ee;
    --border-2: #c8d1e0;
    --ink: #0f172a;
    --ink-2: #475569;
    --muted: #94a3b8;
    --danger: #dc2626;
    --success: #16a34a;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; font-family: 'IBM Plex Arabic', system-ui, sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; -webkit-font-smoothing: antialiased; }
  .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; gap: 14px; }
  .topbar .logo { width: 32px; height: 32px; border-radius: 8px; background: linear-gradient(135deg, var(--brand-500), var(--brand-700)); flex-shrink: 0; }
  .topbar .title { font-weight: 700; font-size: 15px; }
  .topbar .tenant-badge { background: #eef2ff; border: 1px solid #c7d2fe; color: var(--brand-700); font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; font-weight: 600; padding: 4px 10px; border-radius: 999px; }
  .topbar .spacer { margin-right: auto; }
  .topbar .user-name { font-size: 13px; color: var(--ink-2); }
  .btn-ghost { background: transparent; border: 1px solid var(--border-2); color: var(--ink-2); border-radius: 8px; padding: 6px 12px; cursor: pointer; font: inherit; font-size: 12.5px; transition: background .15s; }
  .btn-ghost:hover { background: var(--bg); }

  .container { max-width: 1100px; margin: 0 auto; padding: 28px 24px 60px; }

  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 24px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px; }
  .stat-card .label { font-size: 12px; color: var(--ink-2); margin-bottom: 6px; }
  .stat-card .value { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; font-family: 'IBM Plex Mono', monospace; }
  .stat-card .delta { font-size: 11px; color: var(--muted); margin-top: 4px; }

  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; margin-bottom: 20px; }
  .panel-head { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  .panel-head h3 { font-size: 14px; font-weight: 700; margin: 0; }
  .panel-head .count { background: var(--bg); color: var(--ink-2); font-size: 11.5px; font-weight: 600; padding: 2px 8px; border-radius: 999px; font-family: 'IBM Plex Mono', monospace; }
  .panel-head .spacer { margin-right: auto; }
  .panel-body { padding: 20px; }
  .empty { padding: 32px 20px; text-align: center; color: var(--muted); font-size: 13px; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: right; padding: 12px 20px; border-bottom: 1px solid var(--border); }
  th { background: #fafbfd; color: var(--ink-2); font-weight: 600; font-size: 12px; }
  tr:last-child td { border-bottom: none; }
  td.num { font-family: 'IBM Plex Mono', monospace; color: var(--ink-2); }

  .form-row { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 10px; align-items: end; }
  .form-row .label { font-size: 12px; color: var(--ink-2); margin-bottom: 4px; display: block; }
  .form-row .input { width: 100%; height: 40px; border: 1px solid var(--border-2); border-radius: 10px; padding: 0 12px; font: inherit; font-size: 13.5px; }
  .form-row .input:focus { outline: none; border-color: var(--brand-500); box-shadow: 0 0 0 3px rgba(29,78,216,0.10); }
  .btn-primary { height: 40px; padding: 0 18px; border: none; border-radius: 10px; background: var(--brand-500); color: #fff; font: inherit; font-size: 13.5px; font-weight: 600; cursor: pointer; transition: background .15s; }
  .btn-primary:hover:not(:disabled) { background: var(--brand-700); }
  .btn-primary:disabled { opacity: .55; cursor: not-allowed; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--ink); color: #fff; padding: 10px 18px; border-radius: 10px; font-size: 13px; box-shadow: 0 10px 30px rgba(0,0,0,0.20); opacity: 0; transition: opacity .25s, transform .25s; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }
  .toast.error { background: var(--danger); }
  .toast.success { background: var(--success); }

  @media (max-width: 720px) {
    .form-row { grid-template-columns: 1fr 1fr; }
    .form-row .btn-primary { grid-column: 1 / -1; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo"></div>
  <div class="title">مِنَصّة</div>
  <span class="tenant-badge" id="tenantBadge">…</span>
  <div class="spacer"></div>
  <div class="user-name" id="userName"></div>
  <button class="btn-ghost" id="logoutBtn">خروج</button>
</div>

<div class="container">
  <div class="stats-grid" id="statsGrid">
    <div class="stat-card"><div class="label">إجمالي الزبائن</div><div class="value" id="statCustomers">…</div></div>
    <div class="stat-card"><div class="label">الفواتير غير المدفوعة</div><div class="value" id="statUnpaid">…</div></div>
    <div class="stat-card"><div class="label">تذكيرات اليوم</div><div class="value" id="statReminders">…</div></div>
    <div class="stat-card"><div class="label">المستخدمون</div><div class="value" id="statUsers">…</div></div>
  </div>

  <div class="panel">
    <div class="panel-head">
      <h3>إضافة زبون سريعة</h3>
    </div>
    <div class="panel-body">
      <form id="addCustomerForm">
        <div class="form-row">
          <div>
            <span class="label">الاسم الكامل</span>
            <input class="input" name="full_name" required>
          </div>
          <div>
            <span class="label">الهاتف</span>
            <input class="input" name="phone_number">
          </div>
          <div>
            <span class="label">المنصة / المصدر</span>
            <input class="input" name="platform_name">
          </div>
          <button class="btn-primary" type="submit" id="addBtn">إضافة</button>
        </div>
      </form>
    </div>
  </div>

  <div class="panel">
    <div class="panel-head">
      <h3>أحدث الزبائن</h3>
      <span class="count" id="customersCount">0</span>
      <div class="spacer"></div>
    </div>
    <div id="customersTable">
      <div class="empty">جاري التحميل…</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function() {
  const apiKey = document.querySelector('meta[name="api-key"]').content;
  const token = (() => { try { return localStorage.getItem('token') || ''; } catch { return ''; } })();
  const cachedUser = (() => { try { return JSON.parse(localStorage.getItem('user') || '{}'); } catch { return {}; } })();

  if (!token) { location.href = '/login'; return; }

  const headers = {
    'X-API-Key': apiKey,
    'Authorization': 'Bearer ' + token,
    'Content-Type': 'application/json',
  };

  function toast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show ' + (type || '');
    clearTimeout(toast._h);
    toast._h = setTimeout(() => { t.className = 'toast'; }, 2400);
  }

  async function api(path, opts = {}) {
    const res = await fetch(path, { headers, ...opts });
    if (res.status === 401) {
      try { localStorage.removeItem('token'); } catch {}
      location.href = '/login';
      throw new Error('unauth');
    }
    const j = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(j.error || ('HTTP ' + res.status));
    return j;
  }

  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  document.getElementById('userName').textContent =
    cachedUser.display_name || cachedUser.username || '';

  document.getElementById('logoutBtn').addEventListener('click', () => {
    try { localStorage.removeItem('token'); localStorage.removeItem('user'); } catch {}
    location.href = '/login';
  });

  // Load tenant info for the badge.
  api('/api/tenants/me').then(t => {
    document.getElementById('tenantBadge').textContent = t.slug || '';
  }).catch(() => {
    document.getElementById('tenantBadge').textContent = '?';
  });

  // Load stats — graceful degradation if any query fails (just shows '—').
  api('/api/dashboard/stats').then(s => {
    document.getElementById('statCustomers').textContent = s.totalCustomers ?? '—';
  }).catch(() => { document.getElementById('statCustomers').textContent = '—'; });

  api('/api/invoices?status=unpaid&pageSize=1').then(r => {
    document.getElementById('statUnpaid').textContent = r.total ?? '—';
  }).catch(() => { document.getElementById('statUnpaid').textContent = '—'; });

  api('/api/reminders/active').then(r => {
    document.getElementById('statReminders').textContent = Array.isArray(r) ? r.length : '—';
  }).catch(() => { document.getElementById('statReminders').textContent = '—'; });

  api('/api/users').then(r => {
    document.getElementById('statUsers').textContent = Array.isArray(r) ? r.length : '—';
  }).catch(() => { document.getElementById('statUsers').textContent = '—'; });

  // Customers list
  function renderCustomers(rows) {
    const wrap = document.getElementById('customersTable');
    document.getElementById('customersCount').textContent = String(rows.length);
    if (rows.length === 0) {
      wrap.innerHTML = '<div class="empty">لا يوجد زبائن بعد — أضف أول واحد من الأعلى.</div>';
      return;
    }
    let html = '<table><thead><tr><th>الاسم</th><th>الهاتف</th><th>المنصة</th><th>التاريخ</th></tr></thead><tbody>';
    for (const r of rows) {
      html += '<tr>' +
        '<td>' + escapeHtml(r.full_name) + '</td>' +
        '<td class="num">' + escapeHtml(r.phone_number || '—') + '</td>' +
        '<td>' + escapeHtml(r.platform_name || '—') + '</td>' +
        '<td class="num">' + escapeHtml(r.created_at || '') + '</td>' +
        '</tr>';
    }
    html += '</tbody></table>';
    wrap.innerHTML = html;
  }

  function loadCustomers() {
    api('/api/customers?pageSize=20').then(r => {
      renderCustomers(r.data || []);
    }).catch(e => {
      document.getElementById('customersTable').innerHTML =
        '<div class="empty">تعذّر التحميل: ' + escapeHtml(e.message) + '</div>';
    });
  }
  loadCustomers();

  // Quick-add form
  document.getElementById('addCustomerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = Object.fromEntries(new FormData(e.target).entries());
    if (!fd.full_name || !fd.full_name.trim()) {
      return toast('الاسم مطلوب', 'error');
    }
    const btn = document.getElementById('addBtn');
    btn.disabled = true;
    btn.textContent = '...';
    try {
      await api('/api/customers', {
        method: 'POST',
        body: JSON.stringify({
          full_name: fd.full_name.trim(),
          phone_number: (fd.phone_number || '').trim(),
          platform_name: (fd.platform_name || '').trim(),
        }),
      });
      e.target.reset();
      toast('تمت الإضافة', 'success');
      loadCustomers();
      // Refresh stat after a successful add.
      api('/api/dashboard/stats').then(s => {
        document.getElementById('statCustomers').textContent = s.totalCustomers ?? '—';
      }).catch(() => {});
    } catch (err) {
      toast(err.message || 'فشلت الإضافة', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'إضافة';
    }
  });
})();
</script>
</body>
</html>
